name: Build production and nightly artifacts
on:
    push:
        branches:
            - main
        tags:
            - 'v*'
    workflow_dispatch:
    schedule:
        # Every week on Sunday at midnight
        - cron: '0 1 * * 0'

permissions:
    contents: write
    actions: write

env:
    GITHUB_SHA: ${{ github.sha }}

jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
            TYPE_OF_BUILD: ${{ steps.set-type.outputs.TYPE }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup build type
              id: set-type
              run: |
                  if [ "${{ github.event_name }}" = "schedule" ]; then
                    TYPE="nightly"
                  elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
                    TYPE="release"
                  elif [[ "${{ github.ref }}" == "refs/heads/main" ]] && [ "${{ github.event_name }}" = "push" ]; then
                    TYPE="production"
                  elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    TYPE="manual"
                  else
                    TYPE="development"
                  fi
                  echo "TYPE=$TYPE" >> $GITHUB_OUTPUT
                  echo "SELECTED_TYPE=$TYPE" >> $GITHUB_ENV

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: mbstring, intl, gd, pdo_mysql, zip, exif, pcntl, bcmath, soap, imagick, xdebug, opcache
                  tools: composer:v2

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist --optimize-autoloader

            - name: Install NPM modules
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - run: npm install --no-audit

            - name: Build frontend (Vite)
              run: npm run build

            - name: Remove unnecessary files and optimize
              run: |
                  # Remove dev dependencies for PHP
                  composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
                  # Remove node_modules as Vite assets are already compiled in /public
                  rm -rf node_modules
                  # Remove testing and config files
                  rm -rf .git .github .gitignore .gitattributes .editorconfig tailwind.config.js .env \
                  .eslintrc.cjs .prettierignore .prettierrc.json .jsconfig.json phpunit.xml \
                  version crowdin.yml install.lock postcss.config.js eslint.config.js \
                  sonar-project.properties tests tests_strategy

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: biznisbox-payload
                  include-hidden-files: true
                  path: ${{ github.workspace }}/

    release:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Get current date
              id: date
              run: echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

            - name: Checkout code
              uses: actions/checkout@v6

            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  name: biznisbox-payload
                  path: ./payload

            - name: Create zip archive
              run: |
                  cd payload
                  zip -r ../biznisbox.zip .
                  cd ..

            - name: Extract Changelog Section
              id: extract_changelog
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  VERSION_CLEAN=${{ github.ref_name }}
                  VERSION_CLEAN=${VERSION_CLEAN#v}
                  CHANGELOG_FILE="CHANGELOG.md"

                  CONTENT=$(awk "/# $VERSION_CLEAN/{flag=1; next} /^# /{flag=0} flag" "$CHANGELOG_FILE")

                  if [ -z "$CONTENT" ]; then
                    CONTENT="No specific changelog entry found for this version in $CHANGELOG_FILE."
                  fi

                  echo "release_notes<<EOF" >> $GITHUB_OUTPUT
                  echo "$CONTENT" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT
            - name: Create release (Tags)
              if: startsWith(github.ref, 'refs/tags/')
              uses: ncipollo/release-action@v1
              with:
                  allowUpdates: true
                  artifacts: 'biznisbox.zip'
                  name: ${{ github.ref_name }}
                  draft: false
                  makeLatest: true
                  tag: ${{ github.ref_name }}
                  body: |
                      # Changelog for ${{ github.ref_name }}

                      ${{ steps.extract_changelog.outputs.release_notes }}

                      ---
                      🚀 Found a bug or issue? Report it here: [**Open Issues**](https://github.com/biznisbox/biznisbox/issues)

                      🐳 [Docker Image](https://hub.docker.com/r/biznisbox/biznisbox/tags)

                      📚 [Documentation](https://docs.biznisbox.com)

                      ## Release Information
                      - **Version**: ${{ github.ref_name }}
                      - **Build Type**: ${{ needs.build.outputs.TYPE_OF_BUILD }}
                      - **Build Time**: ${{ steps.date.outputs.date }}
                  prerelease: false
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Create nightly release
              if: github.event_name == 'schedule'
              uses: ncipollo/release-action@v1
              with:
                  tag: nightly
                  allowUpdates: true
                  name: BiznisBox Nightly Build
                  artifacts: 'biznisbox.zip'
                  draft: false
                  makeLatest: false
                  prerelease: false
                  body: |
                      This is a nightly build of BiznisBox.

                      Run ID: ${{ github.run_id }}
                      Build Type: ${{ needs.build.outputs.TYPE_OF_BUILD }}
                      Build Time: ${{ steps.date.outputs.date }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Create dev/manual release
              if: |
                  (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
                  (github.event_name == 'workflow_dispatch')
              uses: ncipollo/release-action@v1
              with:
                  tag: dev
                  allowUpdates: true
                  name: BiznisBox Dev Build
                  artifacts: 'biznisbox.zip'
                  makeLatest: false
                  prerelease: false
                  draft: false
                  body: |
                      Development build from main branch.
                      - **Type**: ${{ needs.build.outputs.TYPE_OF_BUILD }}
                      - **Build Time**: ${{ steps.date.outputs.date }}
                      - **SHA**: ${{ github.sha }}
                  token: ${{ secrets.GITHUB_TOKEN }}
